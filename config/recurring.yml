#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

development:
  # Demo cadence support: the job itself remains due-time and overlap guarded.
  pricing_scheduler_tick:
    class: SchedulerTickJob
    schedule: every minute

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Tick-based scheduler (D3): checks Setting#next_run_at against the clock and
  # enqueues a pricing run when due. A one-minute tick means frequency changes
  # take effect quickly and missed ticks self-heal.
  pricing_scheduler_tick:
    class: SchedulerTickJob
    schedule: every minute
